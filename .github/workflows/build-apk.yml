name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Cache Buildozer and Gradle
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            /home/runner/.buildozer
            /home/runner/.gradle
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip autoconf automake libtool \
            pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev \
            ccache build-essential libltdl-dev \
            wget openjdk-17-jdk gettext autopoint

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer cython==0.29.33 virtualenv

      - name: Build debug APK
        run: |
          buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: immune-audit-apk
          path: bin/*.apk
          if-no-files-found: error
